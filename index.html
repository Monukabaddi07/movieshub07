<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        * {
            margin: auto;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .player-card {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background: #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: calc(100% - 60px);
            object-fit: contain;
            background: #000;
            display: block;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 60px);
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.8) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            opacity: 1;
            transition: opacity 0.6s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(15px);
            z-index: 0;
        }

        .loading-content {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .loading-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            position: relative;
        }

        .loading-circle {
            width: 100%;
            height: 100%;
            border: 5px solid rgba(255, 255, 255, 0.15);
            border-top: 5px solid #fff;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.9);
        }

        .loading-subtitle {
            font-size: 15px;
            color: #b3b3b3;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
        }

        /* Overlay Play Button */
        .overlay-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .overlay-play i {
            font-size: 48px;
            color: #fff;
            margin-left: 6px;
        }

        .overlay-play:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        /* On-screen Skip/Rewind Controls */
        .onscreen-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
            z-index: 45;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .onscreen-controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .onscreen-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
            font-size: 28px;
            transition: all 0.2s ease;
            font-weight: bold;
            backdrop-filter: blur(8px);
        }

        .onscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        .onscreen-btn:active {
            transform: scale(0.95);
        }

        /* Instagram Logo */
        .instagram-logo {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #feda75, #fa7e1e, #d92e7f, #9b36b7, #515bd4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            z-index: 999;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .instagram-logo i {
            font-size: 32px;
            color: #fff;
        }

        .instagram-logo:hover {
            transform: scale(1.15) translateY(-10px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        .overlay-play i {
            font-size: 48px;
            color: #fff;
            margin-left: 6px;
        }

        .overlay-play:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        /* Controls Bar */
        .controls-bar {
            display: -webkit-box;
            align-items: center;
            padding: 12px 20px;
            background: rgba(20, 20, 20, 0.98);
            gap: 10px;
            height: 60px;
            opacity: 1;
            transition: opacity 0.3s ease;
            position: relative;
            z-index: 100;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .controls-bar.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Button Styles */
        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Time and Info */
        .time,
        .volume-container,
        .seek-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .time {
            gap: 5px;
            font-size: 13px;
            color: #b3b3b3;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .seek-container {
            flex: 1;
            min-width: 100px;
        }

        .seek-container .slider {
            width: 100%;
        }

        .volume-container {
            padding-right: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .volume-container .slider {
            width: 60px;
        }

        /* Slider Styles */
        .slider {
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(to right, #ffffff 0%, rgba(255, 255, 255, 0.1) 0%);
            outline: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .slider:hover {
            height: 6px;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
        }

        .slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        .slider::-moz-range-thumb:hover {
            transform: scale(1.3);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
        }

        /* Dropdowns and Selects */
        .control-select,
        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
            white-space: nowrap;
            flex-shrink: 0;
            font-family: inherit;
        }

        .control-select:hover,
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .control-select option {
            background: #1a1a1a;
            color: #fff;
        }

        /* Error Message */
        .error-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff3333;
            color: #fff;
            padding: 14px 24px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 2000;
            max-width: 90%;
            box-shadow: 0 4px 20px rgba(255, 51, 51, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .error-message.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* Fullscreen */
        .player-card:-webkit-full-screen {
            width: 100vw;
            height: 100vh;
            max-width: none;
            aspect-ratio: auto;
            border-radius: 0;
        }

        .player-card:-moz-full-screen {
            width: 100vw;
            height: 100vh;
            max-width: none;
            aspect-ratio: auto;
            border-radius: 0;
        }

        .player-card:fullscreen {
            width: 100vw;
            height: 100vh;
            max-width: none;
            aspect-ratio: auto;
            border-radius: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .player-card {
                width: 95vw;
            }

            .btn {
                font-size: 16px;
                width: 32px;
                height: 32px;
            }

            .overlay-play {
                width: 80px;
                height: 80px;
            }

            .overlay-play i {
                font-size: 36px;
            }

            .onscreen-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }

            .onscreen-controls {
                gap: 30px;
            }

            .loading-icon {
                width: 80px;
                height: 80px;
                margin: 0 auto 20px;
            }

            .loading-title {
                font-size: 24px;
            }

            .loading-subtitle {
                font-size: 14px;
            }

            .controls-bar {
                padding: 10px 16px;
                gap: 8px;
                flex-wrap: wrap;
            }

            .time {
                font-size: 12px;
            }

            .control-select,
            .fullscreen-btn {
                padding: 6px 10px;
                font-size: 12px;
            }

            /* Vertical volume slider for mobile */
            .volume-container {
                flex-direction: column;
                gap: 8px;
                position: relative;
                padding: 8px 0;
            }

            .volume-container .slider {
                width: 4px;
                height: 80px;
                writing-mode: bt-lr;
            }

            .volume-container .slider::-webkit-slider-thumb {
                width: 16px;
                height: 16px;
            }

            .volume-container .slider::-moz-range-thumb {
                width: 16px;
                height: 16px;
            }

            .instagram-logo {
                width: 50px;
                height: 50px;
                bottom: 20px;
                right: 20px;
            }

            .instagram-logo i {
                font-size: 26px;
            }
        }

        .btn {
            font-size: 16px;
            width: 32px;
            height: 32px;
        }

        .overlay-play {
            width: 80px;
            height: 80px;
        }

        .overlay-play i {
            font-size: 36px;
        }

        .loading-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
        }

        .loading-title {
            font-size: 22px;
        }

        .loading-subtitle {
            font-size: 13px;
        }

        .controls-bar {
            padding: 10px 16px;
            gap: 8px;
        }

        .time {
            font-size: 12px;
        }

        .control-select,
        .fullscreen-btn {
            padding: 6px 10px;
            font-size: 12px;
        }


        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .player-card {
                border-radius: 6px;

                aspect-ratio: 16 / 9;
            }

            .btn {
                font-size: 14px;
                width: 28px;
                height: 28px;
                padding: 4px;
            }

            .overlay-play {
                width: 70px;
                height: 70px;
            }

            .overlay-play i {
                font-size: 28px;
            }

            .onscreen-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }

            .onscreen-controls {
                gap: 25px;
            }

            .time {
                font-size: 11px;
            }

            .loading-title {
                font-size: 18px;
            }

            .controls-bar {
                padding: 8px 12px;
                gap: 6px;
                height: auto;
                flex-wrap: wrap;
            }

            /* Vertical volume slider for small screens */
            .volume-container {
                flex-direction: column;
                gap: 6px;
                padding: 6px 0;
            }

            .volume-container .slider {
                width: 3px;
                height: 70px;
                writing-mode: bt-lr;
            }

            .volume-container .slider::-webkit-slider-thumb {
                width: 14px;
                height: 14px;
            }

            .volume-container .slider::-moz-range-thumb {
                width: 14px;
                height: 14px;
            }

            .seek-container {
                gap: 10px;
                flex: 0.8;
            }

            .control-select,
            .fullscreen-btn {
                padding: 6px 8px;
                font-size: 11px;
            }

            .time {
                gap: 2px;
            }

            .instagram-logo {
                width: 45px;
                height: 45px;
                bottom: 15px;
                right: 15px;
            }

            .instagram-logo i {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="player-card">
        <div class="video-wrapper">
            <!-- Video Element -->
            <video id="player" muted></video>

            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-bg" id="loadingBg"></div>
                <div class="loading-content">
                    <div class="loading-icon">
                        <div class="loading-circle"></div>
                    </div>
                    <h2 class="loading-title" id="loadingTitle">Preparing Video</h2>
                    <p class="loading-subtitle">Loading...</p>
                </div>
            </div>

            <!-- Play Button Overlay -->
            <div class="overlay-play" id="overlayPlay">
                <i class="fas fa-play"></i>
            </div>

            <!-- On-screen Skip/Rewind Controls -->
            <div class="onscreen-controls" id="onscreenControls">
                <button class="onscreen-btn" id="onscreenRewind" title="Rewind 10s">
                    <i class="fas fa-rotate-left"></i> 10
                </button>
                <button class="onscreen-btn" id="onscreenForward" title="Skip 10s">
                    10 <i class="fas fa-rotate-right"></i>
                </button>
            </div>

            <!-- Controls Bar -->
            <div class="controls-bar" id="controlsBar">
                <!-- Play/Pause -->
                <button id="playPauseBtn" class="btn" title="Play/Pause">
                    <i class="fas fa-play"></i>
                </button>

                <!-- Skip/Rewind -->
                <button id="rewindBtn" class="btn" title="Rewind 10s">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button id="forwardBtn" class="btn" title="Skip 10s">
                    <i class="fas fa-step-forward"></i>
                </button>

                <!-- Volume -->
                <div class="volume-container">
                    <button id="muteBtn" class="btn" title="Mute">
                        <i class="fas fa-volume-high"></i>
                    </button>
                    <input type="range" id="volumeSlider" min="0" max="100" value="100" class="slider volume" />
                </div>

                <!-- Playback Speed -->
                <select id="playbackSpeed" class="control-select">
                    <option value="1">1x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>

                <!-- Time Display -->
                <span class="time">
                    <span id="currentTime">0:00</span> /
                    <span id="duration">0:00</span>
                </span>

                <!-- Progress Bar -->
                <div class="seek-container">
                    <input type="range" id="seekBar" min="0" max="100" value="0" class="slider seek" />
                </div>

                <!-- Download -->
                <button id="downloadBtn" class="btn" title="Download">
                    <i class="fas fa-download"></i>
                </button>

                <!-- Fullscreen -->
                <button id="fullscreenBtn" class="fullscreen-btn">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Error Message -->
    <div class="error-message" id="errorMessage"></div>

    <!-- Instagram Logo -->
    <a href="https://www.instagram.com/monukabaddi.007/" target="_blank" rel="noopener noreferrer"
        class="instagram-logo" title="Follow on Instagram">
        <i class="fab fa-instagram"></i>
    </a>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ============ CONFIGURATION ============
        const firebaseConfig = {
            apiKey: "AIzaSyA8JHU7qGrKlLwJZKzK3Rj9zLMoTqsHN44",
            authDomain: "admin-488f7.firebaseapp.com",
            databaseURL: "https://admin-488f7-default-rtdb.firebaseio.com",
            projectId: "admin-488f7",
            storageBucket: "admin-488f7.appspot.com",
            messagingSenderId: "640638260644",
            appId: "1:640638260644:web:0e63d47918ff41b71f9d31"
        };

        // ============ STATE ============
        let player = null;
        let database = null;
        let currentVideoData = null;
        let duration = 0;
        let lastVolume = 100;
        let seekBar, volumeSlider;

        // ============ DOM ELEMENTS ============
        const videoElement = document.getElementById('player');
        const playerCard = document.querySelector('.player-card');
        const overlayPlay = document.getElementById('overlayPlay');
        const controlsBar = document.getElementById('controlsBar');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingBg = document.getElementById('loadingBg');
        const loadingTitle = document.getElementById('loadingTitle');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const muteBtn = document.getElementById('muteBtn');
        const playbackSpeedSelect = document.getElementById('playbackSpeed');
        const currentTimeDisplay = document.getElementById('currentTime');
        const durationDisplay = document.getElementById('duration');
        const downloadBtn = document.getElementById('downloadBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const errorMessageEl = document.getElementById('errorMessage');
        const onscreenControls = document.getElementById('onscreenControls');
        const onscreenRewind = document.getElementById('onscreenRewind');
        const onscreenForward = document.getElementById('onscreenForward');

        // ============ INITIALIZATION ============
        function waitForFirebase(callback) {
            let attempts = 0;
            const checkInterval = setInterval(() => {
                if (typeof firebase !== 'undefined') {
                    clearInterval(checkInterval);
                    callback();
                } else if (attempts++ > 50) {
                    clearInterval(checkInterval);
                    showError('Firebase failed to load');
                }
            }, 100);
        }

        function initialize() {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            database = firebase.database();
            seekBar = document.getElementById('seekBar');
            volumeSlider = document.getElementById('volumeSlider');
            setupEventListeners();
            loadVideoFromUrl();
        }

        // ============ EVENT LISTENERS ============
        function setupEventListeners() {
            playPauseBtn.addEventListener('click', togglePlayPause);
            overlayPlay.addEventListener('click', togglePlayPause);
            videoElement.addEventListener('click', togglePlayPause);

            rewindBtn.addEventListener('click', () => skip(-10));
            forwardBtn.addEventListener('click', () => skip(10));

            // On-screen controls
            onscreenRewind.addEventListener('click', () => skip(-10));
            onscreenForward.addEventListener('click', () => skip(10));

            muteBtn.addEventListener('click', toggleMute);
            volumeSlider.addEventListener('input', handleVolume);
            seekBar.addEventListener('input', handleSeek);
            playbackSpeedSelect.addEventListener('change', handleSpeedChange);
            fullscreenBtn.addEventListener('click', toggleFullscreen);
            downloadBtn.addEventListener('click', downloadVideo);

            videoElement.addEventListener('timeupdate', updateProgress);
            videoElement.addEventListener('loadedmetadata', onPlayerReady);
            videoElement.addEventListener('play', onPlay);
            videoElement.addEventListener('pause', onPause);

            document.addEventListener('fullscreenchange', updateFullscreenButton);
            document.addEventListener('keydown', handleKeyboard);

            // Mouse hide controls on video
            videoElement.addEventListener('mousemove', showControls);
            videoElement.addEventListener('mouseleave', scheduleControlHide);
            controlsBar.addEventListener('mouseenter', showControls);
            onscreenControls.addEventListener('mouseenter', showControls);

            // Touch events for on-screen controls
            videoElement.addEventListener('touchstart', () => {
                showOnscreenControls();
                showControls();
            });
            videoElement.addEventListener('touchmove', () => {
                showOnscreenControls();
            });
            videoElement.addEventListener('touchend', scheduleOnscreenControlsHide);

            // Mouse events for on-screen controls
            videoElement.addEventListener('mousemove', showOnscreenControls);

            updateSliderFill(volumeSlider);
        }

        // ============ PLAYBACK CONTROL ============
        function togglePlayPause() {
            if (videoElement.paused) {
                videoElement.play();
            } else {
                videoElement.pause();
            }
        }

        function skip(seconds) {
            videoElement.currentTime = Math.max(0, Math.min(duration, videoElement.currentTime + seconds));
            updateSliderFill(seekBar);
        }

        function handleSeek(e) {
            const percentage = parseFloat(e.target.value);
            videoElement.currentTime = (percentage / 100) * duration;
            updateSliderFill(seekBar);
        }

        // ============ VOLUME CONTROL ============
        function toggleMute() {
            if (videoElement.volume === 0) {
                videoElement.volume = lastVolume / 100;
                volumeSlider.value = lastVolume;
            } else {
                lastVolume = volumeSlider.value;
                videoElement.volume = 0;
                volumeSlider.value = 0;
            }
            updateVolumeButton();
            updateSliderFill(volumeSlider);
        }

        function handleVolume(e) {
            const newVolume = parseInt(e.target.value);
            videoElement.volume = newVolume / 100;
            lastVolume = newVolume;
            updateVolumeButton();
            updateSliderFill(volumeSlider);
        }

        function updateVolumeButton() {
            const vol = videoElement.volume;
            if (vol === 0) {
                muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
            } else if (vol < 0.5) {
                muteBtn.innerHTML = '<i class="fas fa-volume-low"></i>';
            } else {
                muteBtn.innerHTML = '<i class="fas fa-volume-high"></i>';
            }
        }

        // ============ PLAYBACK SPEED ============
        function handleSpeedChange(e) {
            videoElement.playbackRate = parseFloat(e.target.value);
        }

        // ============ FULLSCREEN ============
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                playerCard.requestFullscreen().catch(err => {
                    console.log(`Fullscreen error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function updateFullscreenButton() {
            if (document.fullscreenElement) {
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        }

        // ============ DOWNLOAD ============
        function downloadVideo() {
            if (!currentVideoData || !currentVideoData.videoUrl) {
                showError('No video to download');
                return;
            }

            const link = document.createElement('a');
            link.href = currentVideoData.videoUrl;
            link.download = currentVideoData.name || 'video.mp4';
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ============ PROGRESS & TIME ============
        function updateProgress() {
            if (duration) {
                const percentage = (videoElement.currentTime / duration) * 100;
                seekBar.value = percentage;
                updateSliderFill(seekBar);
                currentTimeDisplay.textContent = formatTime(videoElement.currentTime);
            }
        }

        function onPlayerReady() {
            duration = videoElement.duration;
            durationDisplay.textContent = formatTime(duration || 0);
        }

        function formatTime(seconds) {
            if (!isFinite(seconds)) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);

            if (h > 0) {
                return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        // ============ SLIDER FILL ============
        function updateSliderFill(slider) {
            const percentage = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
            slider.style.background = `linear-gradient(to right, #ffffff ${percentage}%, rgba(255, 255, 255, 0.1) ${percentage}%)`;
        }

        // ============ PLAY/PAUSE STATE ============
        function onPlay() {
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            overlayPlay.style.opacity = '0';
            hideOnscreenControls();
            scheduleControlHide();
        }

        function onPause() {
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            overlayPlay.style.opacity = '1';
            showOnscreenControls();
            showControls();
        }

        // ============ ON-SCREEN CONTROLS ============
        let onscreenControlsTimeout = null;

        function showOnscreenControls() {
            // Show on any user activity
            onscreenControls.classList.add('visible');
            scheduleOnscreenControlsHide();
        }

        function hideOnscreenControls() {
            clearTimeout(onscreenControlsTimeout);
            onscreenControls.classList.remove('visible');
        }

        function scheduleOnscreenControlsHide() {
            clearTimeout(onscreenControlsTimeout);
            // Auto-hide after 3 seconds of inactivity regardless of playing/paused state
            onscreenControlsTimeout = setTimeout(() => {
                onscreenControls.classList.remove('visible');
            }, 3000);
        }

        // ============ CONTROLS AUTO-HIDE ============
        let controlHideTimeout = null;

        function showControls() {
            controlsBar.classList.remove('hidden');
            scheduleControlHide();
        }

        function scheduleControlHide() {
            clearTimeout(controlHideTimeout);
            if (!videoElement.paused) {
                controlHideTimeout = setTimeout(() => {
                    controlsBar.classList.add('hidden');
                }, 3000);
            }
        }

        // ============ KEYBOARD SHORTCUTS ============
        function handleKeyboard(e) {
            if (e.target === document.body || e.target === videoElement) {
                switch (e.code) {
                    case 'Space':
                        e.preventDefault();
                        togglePlayPause();
                        break;
                    case 'ArrowRight':
                        skip(5);
                        showControls();
                        break;
                    case 'ArrowLeft':
                        skip(-5);
                        showControls();
                        break;
                    case 'KeyF':
                        if (!e.ctrlKey && !e.metaKey) {
                            toggleFullscreen();
                        }
                        break;
                    case 'KeyM':
                        toggleMute();
                        showControls();
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        videoElement.volume = Math.min(1, videoElement.volume + 0.1);
                        volumeSlider.value = videoElement.volume * 100;
                        lastVolume = volumeSlider.value;
                        updateVolumeButton();
                        updateSliderFill(volumeSlider);
                        showControls();
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        videoElement.volume = Math.max(0, videoElement.volume - 0.1);
                        volumeSlider.value = videoElement.volume * 100;
                        lastVolume = volumeSlider.value;
                        updateVolumeButton();
                        updateSliderFill(volumeSlider);
                        showControls();
                        break;
                }
            }
        }

        // ============ VIDEO LOADING ============
        async function loadVideoFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const videoId = params.get('id');

            if (!videoId) {
                showError('No video ID provided. Use ?id=VIDEO_ID to load a video.');
                hideLoadingOverlay();
                return;
            }

            try {
                const videoRef = database.ref('videos/' + videoId);
                const snapshot = await videoRef.get();

                if (!snapshot.exists()) {
                    showError(`Video with ID "${videoId}" not found.`);
                    hideLoadingOverlay();
                    return;
                }

                currentVideoData = snapshot.val();
                displayLoadingDetails();
                playVideo(currentVideoData);
            } catch (error) {
                console.error('Error loading video:', error);
                showError('Error loading video. Please try again.');
                hideLoadingOverlay();
            }
        }

        function displayLoadingDetails() {
            if (currentVideoData.thumbnailUrl) {
                loadingBg.style.backgroundImage = `url('${currentVideoData.thumbnailUrl}')`;
            }
            loadingTitle.textContent = currentVideoData.name || 'Loading...';
        }

        function playVideo(videoData) {
            if (!videoData || !videoData.videoUrl) {
                showError('Invalid video data');
                return;
            }

            videoElement.src = videoData.videoUrl;
            videoElement.load();

            // Try to play on loadeddata
            videoElement.addEventListener('loadeddata', () => {
                hideLoadingOverlay();
                // Attempt to play with muted flag for autoplay compatibility
                const playPromise = videoElement.play();
                if (playPromise !== undefined) {
                    playPromise.catch(err => {
                        console.log('[v0] Auto-play prevented, retrying with muted:', err);
                        // If autoplay failed, try with muted
                        videoElement.muted = true;
                        videoElement.play().catch(e => console.log('[v0] Even muted play failed:', e));
                    });
                }
            }, { once: true });
        }

        function hideLoadingOverlay() {
            loadingOverlay.classList.add('hidden');
            showControls();
        }

        // ============ ERROR HANDLING ============
        function showError(message) {
            errorMessageEl.textContent = message;
            errorMessageEl.classList.add('show');
            setTimeout(() => {
                errorMessageEl.classList.remove('show');
            }, 5000);
        }

        // ============ STARTUP ============
        document.addEventListener('DOMContentLoaded', () => {
            waitForFirebase(() => {
                initialize();
            });
        });
    </script>
</body>

</html>
